name: mescc-riscv64-uint32-add
# GREEN == the bug REPRODUCES: MesCC's riscv64 codegen skips the mod-2^32
# truncation on unsigned arithmetic (.s lacks the re-mask; MesCC-built binary
# exits 42 under qemu), while host gcc / riscv64-gcc / the explicit-cast leg
# all yield the wrapped-correct 0.
on:
  push:
  workflow_dispatch:
jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install guile + riscv64 cross toolchain + qemu-user
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q guile-3.0 gcc-riscv64-linux-gnu qemu-user-static
      - name: Reproduce ((imm+2048)>>12 = 0x100000 under MesCC, 0 everywhere else)
        run: bash bugs/09-mescc-riscv64-uint32-add/run.sh
